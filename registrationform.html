<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form | Insurance Corner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container minimal">
            <a href="homepage.html" class="logo">Insurance Corner</a>
        </div>
    </nav>

    <div class="container registration-container">
        
        <div class="card registration-card">
            
            <h2 class="form-title">Applicant Registration Form</h2>
            
            <form id="jobAppForm" action="postregistration.html" class="registration-form">
                
                <div class="form-row-3">
                    <div>
                        <label class="form-label">First Name *</label>
                        <input type="text" id="fName" class="form-input" maxlength="50" placeholder="Enter first name">
                    </div>
                    <div>
                        <label class="form-label">Last Name *</label>
                        <input type="text" id="lName" class="form-input" maxlength="50" placeholder="Enter last name">
                    </div>
                    <div>
                        <label class="form-label">Email ID *</label>
                        <input type="email" id="emailInput" class="form-input" placeholder="abc.example@gmail.com">
                    </div>
                </div>

                <div class="form-row-3">
                    <div>
                        <label class="form-label">Mobile Number *</label>
                        <input type="number" id="phoneInput" class="form-input" placeholder="10 digits">
                    </div>
                    <div>
                        <label class="form-label">Date of Birth *</label>
                        <input type="date" id="dobInput" class="form-input date-input">
                    </div>
                    <div>
                        <label class="form-label">Gender *</label>
                        <div class="radio-group">
                            <label class="radio-item"><input type="radio" name="gender" value="male"> Male</label>
                            <label class="radio-item"><input type="radio" name="gender" value="female"> Female</label>
                        </div>
                    </div>
                </div>

                <div class="form-row-4">
                    <div>
                        <label class="form-label">Address *</label>
                        <input type="text" id="addressInput" class="form-input" placeholder="Enter full address">
                    </div>
                    <div>
                        <label class="form-label">City *</label>
                        <input type="text" id="cityInput" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">State *</label>
                        <input type="text" id="stateInput" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Pin Code *</label>
                        <input type="number" id="pinInput" class="form-input" placeholder="6 digits">
                    </div>
                </div>

                <div>
                    <label class="form-label" style="margin-bottom: 6px;">Courses Applied For:</label>
                    <div class="checkbox-box">
                        <label class="checkbox-item"><input type="checkbox"> BCA</label>
                        <label class="checkbox-item"><input type="checkbox"> B.Com</label>
                        <label class="checkbox-item"><input type="checkbox"> B.Sc</label>
                        <label class="checkbox-item"><input type="checkbox"> MCA</label>
                    </div>
                </div>

                <div id="errorMsg" class="error-message"></div>
            </form>
        </div>

        <div class="bottom-actions">
            <button type="button" class="action-btn btn-grey" onclick="history.back()">Go Back</button>
            <button type="button" class="action-btn btn-grey" onclick="window.location.href='homepage.html'">Go Home</button>
            <button type="submit" form="jobAppForm" class="action-btn btn-primary-action">Submit Application</button>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 Insurance Corner Company Limited.</p>
    </footer>

    <script>
        document.getElementById('jobAppForm').addEventListener('submit', function(event) {
            let errorArea = document.getElementById('errorMsg');
            let errors = [];

            let fName = document.getElementById('fName').value.trim();
            let email = document.getElementById('emailInput').value.trim();
            let phone = document.getElementById('phoneInput').value.trim();
            let pin = document.getElementById('pinInput').value.trim();
            
            if (!fName || !email || !phone) {
                errors.push("Please fill in all required fields marked with *.");
            }

            if (phone && (phone.length !== 10 || isNaN(phone))) {
                errors.push("Mobile Number must be exactly 10 digits.");
            }

            if (pin && (pin.length !== 6 || isNaN(pin))) {
                errors.push("Pin Code must be exactly 6 digits.");
            }

            let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email && !emailRegex.test(email)) {
                errors.push("Please enter a valid email address.");
            }

            if (errors.length > 0) {
                event.preventDefault(); 
                errorArea.innerHTML = errors.join(" | "); 
                errorArea.style.display = 'block';
            } else {
                errorArea.style.display = 'none';
            }
        });
    </script>

</body>
</html>
