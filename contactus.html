<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Insurance Corner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container minimal">
            <a href="homepage.html" class="logo">Insurance Corner</a>
        </div>
    </nav>

    <div class="container contact-container">
        
        <div class="card contact-card">
            
            <div class="contact-header">
                
                <div class="contact-info-wrapper">
                    
                    <div class="contact-info-block">
                        <h3 class="contact-info-title">Phone Support</h3>
                        <p class="contact-info-text mb-4">+91 XXXXX XXXXX</p>
                        <p class="contact-info-text">+91 XXXXX XXXXX</p>
                    </div>

                    <div class="contact-info-block email-block">
                        <h3 class="contact-info-title">Email Us</h3>
                        <p class="contact-info-text email-text">insurancecorner@gmail.com</p>
                    </div>

                </div>
            </div>

            <div class="contact-body">
                <h3 class="contact-subtitle">Your Personal Photo</h3>
                
                <label for="photoUpload" class="upload-box">
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <span class="upload-text-main">Click to browse</span>
                    <span class="upload-text-sub">JPG or PNG</span>
                </label>
                
                <input type="file" id="photoUpload" accept="image/*" class="hidden-input">
            </div>

        </div>

        <div class="center-btn-wrapper">
            <button type="button" class="action-btn btn-grey btn-wide" onclick="window.location.href='homepage.html'">Go Home</button>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 Insurance Corner Company Limited.</p>
    </footer>

</body>
</html>
